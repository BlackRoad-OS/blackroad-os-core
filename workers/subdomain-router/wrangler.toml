name = "blackroad-subdomain-router"
main = "src/index.ts"
compatibility_date = "2024-12-13"
account_id = "848cf0b18d51e0170e0d1537aec3505a"
workers_dev = true

[vars]
ENVIRONMENT = "production"

# KV Namespaces (top-level so they bind in all deploy modes)
[[kv_namespaces]]
binding = "CACHE"
id = "c878fbcc1faf4eddbc98dcfd7485048d"

[[kv_namespaces]]
binding = "IDENTITIES"
id = "10bf69b8bc664a5a832e348f1d0745cf"

[[kv_namespaces]]
binding = "API_KEYS"
id = "57e48a017d4248a39df32661c3377908"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "245a00ee1ffe417fbcf519b2dbb141c6"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "blackroad-os-main"
database_id = "e2c6dcd9-c21a-48ac-8807-7b3a6881c4f7"

# Routes configured separately via Cloudflare dashboard or wrangler CLI
# To add routes manually: wrangler routes add <pattern> <worker-name> --zone-name <zone>

[env.staging]
name = "blackroad-subdomain-router-staging"
vars = { ENVIRONMENT = "staging" }

[env.development]
name = "blackroad-subdomain-router-dev"
vars = { ENVIRONMENT = "development" }
