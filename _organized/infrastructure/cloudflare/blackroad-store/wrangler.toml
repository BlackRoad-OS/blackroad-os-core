# Cloudflare Pages Configuration for BlackRoad Store
# This file is optional but provides additional configuration options

name = "blackroad-store"
compatibility_date = "2025-01-01"

[site]
bucket = "./dist"

# Custom headers for security and performance
[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets
[[headers]]
for = "/css/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/js/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# HTML caching
[[headers]]
for = "*.html"

[headers.values]
Cache-Control = "public, max-age=3600, must-revalidate"

# Redirects
[[redirects]]
from = "/store"
to = "/"
status = 301

[[redirects]]
from = "/products"
to = "/products/subscriptions.html"
status = 301

[[redirects]]
from = "/pricing"
to = "/products/subscriptions.html"
status = 301

[[redirects]]
from = "/packs"
to = "/products/packs.html"
status = 301

[[redirects]]
from = "/services"
to = "/products/services.html"
status = 301

# 404 handling
[[redirects]]
from = "/*"
to = "/404.html"
status = 404
