name: Core Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_SERVICE: core-api
      HEALTHCHECK_URL: https://core.blackroad.systems/health
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint and test
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Railway CLI
        run: npm install -g railway

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway login --token "$RAILWAY_TOKEN"
          railway link --project "$RAILWAY_PROJECT_ID"
          railway up --service "$RAILWAY_SERVICE" --detach

      - name: Verify healthcheck
        env:
          HEALTHCHECK_URL: ${{ env.HEALTHCHECK_URL }}
        run: |
          echo "Pinging $HEALTHCHECK_URL"
          curl --fail --retry 5 --retry-delay 5 "$HEALTHCHECK_URL"
