name: Deploy All Cloudflare Domains

on:
  push:
    branches:
      - main
    paths:
      - 'domains/**'
  pull_request:
    branches:
      - main
    paths:
      - 'domains/**'
  workflow_dispatch:

jobs:
  # Dynamic domain detection and deployment
  detect-and-deploy:
    name: Deploy Changed Domains
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # New Dynamic Apps
          - domain: agents-blackroad-io
            project: blackroad-agents-spawner
          - domain: dashboard-blackroad-io
            project: blackroad-dashboard
          - domain: api-explorer-blackroad-io
            project: blackroad-api-explorer

          # Payment & Commerce
          - domain: pay-blackroad-io
            project: blackroad-payment-page
          - domain: buy-blackroad-io
            project: blackroad-buy-now

          # Existing Domains
          - domain: chat-blackroad-io
            project: blackroad-chat
          - domain: math-blackroad-io
            project: lucidia-math

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if domain changed
        id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "domains/${{ matrix.domain }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy domains/${{ matrix.domain }} --project-name=${{ matrix.project }} --branch=${{ github.head_ref || github.ref_name }}

  deploy-workers:
    name: Deploy Cloudflare Workers
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'workers/') || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        worker:
          - name: payment-gateway
            path: workers/payment-gateway
          - name: subdomain-router
            path: workers/subdomain-router
          - name: api-gateway
            path: workers/api-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if worker changed
        id: check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "${{ matrix.worker.path }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Setup Node.js
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          cd ${{ matrix.worker.path }}
          npm install

      - name: Deploy Worker
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.worker.path }}
          command: deploy

  # Notification job (runs after all deployments)
  notify:
    name: Deployment Summary
    needs: [detect-and-deploy, deploy-workers]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "✅ Deployment workflow completed"
          echo "📊 Check deployment status at:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
