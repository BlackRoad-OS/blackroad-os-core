name: docs-ci 📚

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'RELEASES.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'RELEASES.md'

permissions:
  contents: read

jobs:
  docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for broken links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './docs/**/*.md' './README.md' './CONTRIBUTING.md' './RELEASES.md'
          fail: false

      - name: Verify required docs exist
        run: |
          echo "📋 Checking required documentation files..."
          
          required_files=("README.md" "CONTRIBUTING.md" "RELEASES.md" "CODEOWNERS" "VERSION")
          
          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file is missing"
              exit 1
            fi
          done
          
          echo "✅ All required documentation files present"

      - name: Check docs directory structure
        run: |
          echo "📁 Checking docs directory..."
          if [ -d "docs" ]; then
            echo "✅ docs/ directory exists"
            ls -la docs/
          else
            echo "⚠️ docs/ directory not found"
          fi
