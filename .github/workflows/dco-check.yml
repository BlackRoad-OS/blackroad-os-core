# Developer Certificate of Origin (DCO) Check
# Enforces that all commits include a Signed-off-by line
# See: https://developercertificate.org/

name: DCO Sign-Off Check

on:
  pull_request:
    branches:
      - main
      - dev
      - staging
  push:
    branches:
      - main

jobs:
  dco-check:
    name: DCO Sign-Off Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history for PR commits but limit for performance/security
          # For PRs, we only need the commits in the PR
          fetch-depth: 100

      - name: Verify commit signatures
        run: |
          echo "Checking DCO Sign-Off for commits..."
          
          # Get commits in this PR or push
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          
          # Handle initial commit or when BASE is not available
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial commit detected, checking recent commits..."
            # Limit to last 50 commits maximum for safety
            COMMITS=$(git rev-list --max-count=50 "$HEAD")
          else
            # Only check commits in this PR/push, limit to 50 for safety
            COMMITS=$(git rev-list --max-count=50 "$BASE".."$HEAD" 2>/dev/null || git rev-list --max-count=50 "$HEAD")
          fi
          
          MISSING_DCO=0
          CHECKED_COUNT=0
          
          for COMMIT in $COMMITS; do
            CHECKED_COUNT=$((CHECKED_COUNT + 1))
            MESSAGE=$(git log --format=%B -n 1 "$COMMIT")
            AUTHOR=$(git log --format="%an <%ae>" -n 1 "$COMMIT")
            
            # Check for Signed-off-by line
            if ! echo "$MESSAGE" | grep -q "^Signed-off-by:"; then
              echo "❌ Missing DCO sign-off in commit: $COMMIT"
              echo "   Author: $AUTHOR"
              echo "   Message: $(echo "$MESSAGE" | head -1)"
              echo ""
              echo "   To fix, amend your commit with:"
              echo "   git commit --amend --signoff"
              echo ""
              MISSING_DCO=1
            else
              echo "✅ DCO sign-off found in commit: $COMMIT"
            fi
          done
          
          echo ""
          echo "Checked $CHECKED_COUNT commit(s)"
          
          if [ "$MISSING_DCO" -eq 1 ]; then
            echo ""
            echo "================================================================"
            echo "DCO Sign-Off Required"
            echo "================================================================"
            echo ""
            echo "This project requires all commits to be signed off per the"
            echo "Developer Certificate of Origin (DCO)."
            echo ""
            echo "See: https://developercertificate.org/"
            echo ""
            echo "To sign off your commits, use:"
            echo "  git commit --signoff -m 'Your commit message'"
            echo ""
            echo "Or add to an existing commit:"
            echo "  git commit --amend --signoff"
            echo ""
            echo "For multiple commits, you can rebase:"
            echo "  git rebase --signoff HEAD~N"
            echo ""
            exit 1
          fi
          
          echo ""
          echo "✅ All commits have valid DCO sign-off!"
