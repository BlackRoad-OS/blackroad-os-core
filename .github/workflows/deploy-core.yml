name: Deploy core-api
name: Deploy core-api to Railway

on:
  push:
    branches:
      - dev
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Determine environment
        id: env
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "env_name=prod" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "staging" ]; then
            echo "env_name=staging" >> $GITHUB_OUTPUT
          else
            echo "env_name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Railway
        run: npx railway up --service core-api --environment ${{ steps.env.outputs.env_name }} --ci

      - name: Health check
        if: steps.env.outputs.env_name != 'dev'
        run: |
          if [ "${{ steps.env.outputs.env_name }}" = "staging" ]; then
            curl -f https://staging.core.blackroad.systems/health
          elif [ "${{ steps.env.outputs.env_name }}" = "prod" ]; then
            curl -f https://core.blackroad.systems/health
          fi
    name: Deploy core-api
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          branch="${GITHUB_REF##*/}"
          case "$branch" in
            dev)
              echo "railway_env=dev" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "railway_env=staging" >> "$GITHUB_OUTPUT"
              ;;
            main)
              echo "railway_env=prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported branch: $branch" >&2
              exit 1
              ;;
          esac

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Deploy core-api
        env:
          RAILWAY_ENV: ${{ steps.env.outputs.railway_env }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN is required" >&2
            exit 1
          fi

          PROJECT_ID=${RAILWAY_PROJECT_ID:-blackroad-core}

          railway login --token "$RAILWAY_TOKEN"
          railway use --project "$PROJECT_ID" --environment "$RAILWAY_ENV" --service core-api
          railway up

      - name: Post-deploy health check
        env:
          RAILWAY_ENV: ${{ steps.env.outputs.railway_env }}
        run: |
          PROJECT_ID=${RAILWAY_PROJECT_ID:-blackroad-core}
          BASE_URL=$(railway variables --project "$PROJECT_ID" --environment "$RAILWAY_ENV" --json | jq -r '.PUBLIC_BASE_URL // empty')

          if [ -z "$BASE_URL" ]; then
            case "$RAILWAY_ENV" in
              dev)
                echo "PUBLIC_BASE_URL not set for dev; please configure it in Railway." >&2
                exit 1
                ;;
              staging)
                BASE_URL="https://staging.core.blackroad.systems"
                ;;
              prod)
                BASE_URL="https://core.blackroad.systems"
                ;;
            esac
          fi

          echo "Health checking $BASE_URL/health"
          curl --fail --retry 6 --retry-delay 10 --max-time 10 "$BASE_URL/health"
