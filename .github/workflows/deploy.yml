name: 🚀 BlackRoad OS - Auto Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy-railway:
    name: 🚂 Deploy to Railway
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy All Services to Railway
        run: |
          echo "🚀 Deploying 8 NEW services to Railway..."

          # List of services to deploy
          services=(
            "blackroad-agent-sigma"
            "blackroad-agent-guardian"
            "blackroad-agent-sentinel"
            "blackroad-blockchain"
            "blackroad-agent-federation"
            "blackroad-data-pipeline"
            "blackroad-cloudflare-manager"
            "blackroad-stripe-monetization-enhanced"
          )

          for service in "${services[@]}"; do
            echo "📦 Deploying $service..."

            # Create railway.toml if it doesn't exist
            if [ ! -f "railway-${service}.toml" ]; then
              cat > "railway-${service}.toml" <<EOF
          [build]
          builder = "NIXPACKS"

          [deploy]
          startCommand = "python3 ${service}.py"
          healthcheckPath = "/health"
          restartPolicyType = "ON_FAILURE"
          restartPolicyMaxRetries = 10
          EOF
            fi

            # Deploy using Railway CLI
            railway up --config "railway-${service}.toml" || echo "⚠️  Failed to deploy $service (may already exist)"
          done

          echo "✅ Railway deployment complete!"

  deploy-cloudflare:
    name: ☁️ Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: deploy-railway

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Wrangler CLI
        run: npm install -g wrangler

      - name: ☁️ Deploy Cloudflare Workers
        run: |
          echo "☁️ Deploying to Cloudflare..."

          # Deploy Workers if we have any
          if [ -d "cloudflare-workers" ]; then
            cd cloudflare-workers
            for worker in */; do
              echo "🚀 Deploying worker: $worker"
              cd "$worker"
              wrangler deploy || echo "⚠️  Worker deployment skipped"
              cd ..
            done
            cd ..
          fi

          echo "✅ Cloudflare deployment complete!"

  notify:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-railway, deploy-cloudflare]
    if: always()

    steps:
      - name: 📢 Deployment Status
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║  🚀 BlackRoad OS Deployment Complete!                   ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          echo "✅ Railway: ${{ needs.deploy-railway.result }}"
          echo "✅ Cloudflare: ${{ needs.deploy-cloudflare.result }}"
          echo ""
          echo "Services deployed:"
          echo "  • Sigma (Teacher Agent)"
          echo "  • Guardian (Security Agent)"
          echo "  • Sentinel (Monitoring Agent)"
          echo "  • Blockchain (Satoshi Tribute)"
          echo "  • Agent Federation"
          echo "  • Data Pipeline"
          echo "  • Cloudflare Manager"
          echo "  • Stripe Service"
          echo ""
          echo "🔗 Commit: ${{ github.sha }}"
          echo "👤 By: ${{ github.actor }}"
          echo ""
          echo "🎉 Deployment triggered by push to ${{ github.ref }}"
