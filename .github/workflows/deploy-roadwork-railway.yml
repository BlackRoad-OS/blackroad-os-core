name: Deploy RoadWork to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'roadwork/**'
  workflow_dispatch:

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy RoadWork API to Railway
        run: |
          cd roadwork
          railway link --project 9d3d2549-3778-4c86-8afd-cefceaaa74d2 --environment production
          railway up --service roadwork-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run Database Migrations
        run: |
          cd roadwork
          railway run alembic upgrade head
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify Deployment
        run: |
          echo "Deployment completed! Check Railway dashboard for status."
          echo "API URL: https://roadwork-api-production.up.railway.app"
