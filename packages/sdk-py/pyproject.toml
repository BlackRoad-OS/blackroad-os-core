[tool.poetry]
name = "blackroad-core"
version = "0.1.0"
description = "Python SDK for BlackRoad OS core services"
authors = ["BlackRoad OS"]
readme = "README.md"
packages = [{include = "blackroad_core"}]

[tool.poetry.dependencies]
python = "^3.10"
pydantic = "^2.8.2"
pyyaml = "^6.0.2"
requests = "^2.32.3"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
