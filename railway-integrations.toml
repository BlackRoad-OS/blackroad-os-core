[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python3 blackroad_integrations_hub.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "integrations"

[services.env]
PORT = "9700"
NODE_ENV = "production"
PYTHONUNBUFFERED = "1"
