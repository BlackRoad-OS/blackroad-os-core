<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRoad Agent Spawner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            opacity: 0.8;
            font-size: 0.9rem;
        }
        .spawn-form {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 1rem;
        }
        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.6);
        }
        button {
            background: linear-gradient(135deg, #FF9D00 0%, #FF6B00 100%);
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .agents-list {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .agent-card {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .agent-id {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .agent-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            background: rgba(76, 175, 80, 0.3);
            border: 1px solid rgba(76, 175, 80, 0.6);
        }
        .agent-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Agent Spawner</h1>
        <p class="subtitle">Deploy autonomous agents across BlackRoad OS</p>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value" id="total-agents">0</div>
                <div class="stat-label">Active Agents</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">30,000</div>
                <div class="stat-label">Max Capacity</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="breath-phase">-</div>
                <div class="stat-label">Breath Phase</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">$0</div>
                <div class="stat-label">Cost/Month</div>
            </div>
        </div>

        <div class="spawn-form">
            <h2 style="margin-bottom: 20px;">Spawn New Agent</h2>
            <form id="spawn-form">
                <div class="form-group">
                    <label for="role">Agent Role</label>
                    <input type="text" id="role" name="role" placeholder="e.g., Financial Analyst, Research Assistant" required>
                </div>
                <div class="form-group">
                    <label for="pack">Pack</label>
                    <select id="pack" name="pack">
                        <option value="core">Core</option>
                        <option value="pack-finance">Finance</option>
                        <option value="pack-legal">Legal</option>
                        <option value="pack-research-lab">Research Lab</option>
                        <option value="pack-creator-studio">Creator Studio</option>
                        <option value="pack-infra-devops">Infra DevOps</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="capabilities">Capabilities (comma-separated)</label>
                    <input type="text" id="capabilities" name="capabilities" placeholder="e.g., analyze_data, generate_reports">
                </div>
                <button type="submit" id="spawn-btn">
                    <span id="spawn-text">Spawn Agent</span>
                    <span id="spawn-loader" class="loading" style="display: none;"></span>
                </button>
            </form>
        </div>

        <div class="agents-list">
            <h2 style="margin-bottom: 20px;">Active Agents</h2>
            <div id="agents-container">
                <div class="loading"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://basket-aus-brass-dog.trycloudflare.com';

        async function loadStats() {
            try {
                const [agentsRes, lucidiaRes] = await Promise.all([
                    fetch(`${API_URL}/agents`),
                    fetch(`${API_URL}/lucidia`)
                ]);
                const agents = await agentsRes.json();
                const lucidia = await lucidiaRes.json();

                document.getElementById('total-agents').textContent = agents.total || 0;
                document.getElementById('breath-phase').textContent = lucidia.phase || '-';
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        async function loadAgents() {
            try {
                const res = await fetch(`${API_URL}/agents`);
                const data = await res.json();

                const container = document.getElementById('agents-container');
                if (data.agents && data.agents.length > 0) {
                    container.innerHTML = data.agents.map(agent => `
                        <div class="agent-card">
                            <div class="agent-header">
                                <div class="agent-id">${agent.id}</div>
                                <div class="agent-status">${agent.status}</div>
                            </div>
                            <div class="agent-details">
                                <div><strong>Role:</strong> ${agent.role}</div>
                                <div><strong>Runtime:</strong> Raspberry Pi</div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p style="opacity: 0.6;">No agents running yet.</p>';
                }
            } catch (err) {
                console.error('Failed to load agents:', err);
                document.getElementById('agents-container').innerHTML =
                    '<p style="opacity: 0.6;">Failed to load agents. Check console.</p>';
            }
        }

        document.getElementById('spawn-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('spawn-btn');
            const text = document.getElementById('spawn-text');
            const loader = document.getElementById('spawn-loader');

            btn.disabled = true;
            text.style.display = 'none';
            loader.style.display = 'inline-block';

            try {
                const formData = new FormData(e.target);
                const capabilities = formData.get('capabilities')
                    .split(',')
                    .map(c => c.trim())
                    .filter(c => c);

                const res = await fetch(`${API_URL}/agents/spawn`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        role: formData.get('role'),
                        pack: formData.get('pack'),
                        capabilities
                    })
                });

                const data = await res.json();
                alert(`Agent spawned successfully! ID: ${data.agent_id}`);
                e.target.reset();
                loadAgents();
                loadStats();
            } catch (err) {
                alert('Failed to spawn agent: ' + err.message);
            } finally {
                btn.disabled = false;
                text.style.display = 'inline';
                loader.style.display = 'none';
            }
        });

        // Initial load
        loadStats();
        loadAgents();

        // Refresh every 5 seconds
        setInterval(() => {
            loadStats();
            loadAgents();
        }, 5000);
    </script>
</body>
</html>
