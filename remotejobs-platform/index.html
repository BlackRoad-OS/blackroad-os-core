<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadWork - AI Job Application Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #FF6B00 0%, #FF0066 100%);
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .setup-prompt {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .setup-prompt h2 {
            margin-bottom: 20px;
            color: #FF6B00;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .tab {
            background: white;
            padding: 15px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .tab.active {
            background: #FF6B00;
            color: white;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        button {
            background: #FF6B00;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #e55f00;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .job-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 4px solid #FF6B00;
        }

        .job-card h3 {
            color: #FF6B00;
            margin-bottom: 10px;
        }

        .job-card .company {
            font-weight: 600;
            margin-bottom: 15px;
            color: #555;
        }

        .job-card .meta {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .job-card .description {
            line-height: 1.6;
            margin-bottom: 15px;
            max-height: 100px;
            overflow: hidden;
        }

        .apply-btn {
            background: #28a745;
            padding: 10px 25px;
            font-size: 14px;
        }

        .apply-btn:hover {
            background: #218838;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .search-bar {
            margin-bottom: 30px;
        }

        .search-bar input {
            font-size: 18px;
            padding: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: #FF6B00;
            margin-bottom: 20px;
        }

        .close-modal {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
        }

        .close-modal:hover {
            color: #000;
        }

        .resume-preview {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 6px;
            margin: 20px 0;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #ddd;
        }

        .ai-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .profile-saved {
            background: #d4edda;
            color: #155724;
            padding: 10px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 RoadWork</h1>
            <p class="tagline">AI-powered job applications. Your resume, customized for every job.</p>
        </header>

        <!-- Setup Profile (shows first time) -->
        <div id="setupSection" class="setup-prompt" style="display:none;">
            <h2>👋 Let's get you started</h2>
            <p style="margin-bottom: 20px; color: #666;">
                Tell me about yourself. I'll use this to customize your resume for every job you apply to.
            </p>

            <div class="form-group">
                <label>Your Name *</label>
                <input type="text" id="userName" placeholder="Jane Doe">
            </div>

            <div class="form-group">
                <label>Your Email *</label>
                <input type="email" id="userEmail" placeholder="jane@email.com">
            </div>

            <div class="form-group">
                <label>Tell me about yourself *</label>
                <textarea id="userBackground" placeholder="Type here... Your experience, skills, achievements, education, whatever you want to highlight. The AI will use this to customize your resume for each job.

Example:
- 5 years in customer service at retail companies
- Excellent communication skills
- Managed teams of 10+ people
- Expert in Salesforce and Zendesk
- Bachelor's degree in Business
- Increased customer satisfaction by 30%"></textarea>
            </div>

            <button onclick="saveProfile()">Save & Start Applying</button>
        </div>

        <!-- Main App (shows after profile setup) -->
        <div id="mainApp" style="display:none;">
            <div class="profile-saved" id="profileBadge" style="display:none;"></div>

            <div class="tabs">
                <div class="tab active" onclick="showTab('browse')">Browse Jobs</div>
                <div class="tab" onclick="showTab('profile')">My Profile</div>
            </div>

            <!-- Browse Jobs Section -->
            <div id="browse" class="section active" style="background: white; padding: 40px; border-radius: 12px;">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search jobs by title, company, or keyword..." onkeyup="searchJobs()">
                </div>

                <div id="jobsList"></div>
            </div>

            <!-- Profile Section -->
            <div id="profile" class="section" style="background: white; padding: 40px; border-radius: 12px;">
                <h2 style="margin-bottom: 20px; color: #FF6B00;">Your Profile</h2>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="editName">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail">
                </div>

                <div class="form-group">
                    <label>Background / Experience</label>
                    <textarea id="editBackground"></textarea>
                </div>

                <button onclick="updateProfile()">Update Profile</button>
                <button onclick="clearProfile()" style="background: #dc3545; margin-left: 10px;">Clear & Start Over</button>
            </div>
        </div>

        <!-- Apply Modal -->
        <div id="applyModal" class="modal">
            <div class="modal-content">
                <span class="close-modal" onclick="closeApplyModal()">&times;</span>
                <h2 id="modalJobTitle"></h2>
                <p id="modalCompany" style="color: #666; margin-bottom: 20px;"></p>

                <div id="applyMessage"></div>

                <h3>AI-Customized Resume <span class="ai-badge">✨ AI Generated</span></h3>
                <div id="aiResume" class="resume-preview"></div>

                <div class="form-group">
                    <label>Cover Letter (Optional)</label>
                    <textarea id="coverLetter" placeholder="Add a personal touch..."></textarea>
                </div>

                <button id="submitAppBtn" onclick="submitApplication()">Submit Application</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://remotejobs-platform.blackroad.workers.dev';

        let allJobs = [];
        let userProfile = null;
        let currentJob = null;

        // Load profile from localStorage
        function loadProfile() {
            const saved = localStorage.getItem('roadwork_profile');
            if (saved) {
                userProfile = JSON.parse(saved);
                document.getElementById('setupSection').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('profileBadge').style.display = 'inline-block';
                document.getElementById('profileBadge').textContent = `👤 ${userProfile.name}`;

                // Populate edit form
                document.getElementById('editName').value = userProfile.name;
                document.getElementById('editEmail').value = userProfile.email;
                document.getElementById('editBackground').value = userProfile.background;

                loadJobs();
            } else {
                document.getElementById('setupSection').style.display = 'block';
                document.getElementById('mainApp').style.display = 'none';
            }
        }

        function saveProfile() {
            const name = document.getElementById('userName').value.trim();
            const email = document.getElementById('userEmail').value.trim();
            const background = document.getElementById('userBackground').value.trim();

            if (!name || !email || !background) {
                alert('Please fill in all fields');
                return;
            }

            userProfile = { name, email, background };
            localStorage.setItem('roadwork_profile', JSON.stringify(userProfile));

            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('profileBadge').style.display = 'inline-block';
            document.getElementById('profileBadge').textContent = `👤 ${name}`;

            loadJobs();
        }

        function updateProfile() {
            const name = document.getElementById('editName').value.trim();
            const email = document.getElementById('editEmail').value.trim();
            const background = document.getElementById('editBackground').value.trim();

            if (!name || !email || !background) {
                alert('Please fill in all fields');
                return;
            }

            userProfile = { name, email, background };
            localStorage.setItem('roadwork_profile', JSON.stringify(userProfile));
            document.getElementById('profileBadge').textContent = `👤 ${name}`;

            alert('Profile updated!');
            showTab('browse');
        }

        function clearProfile() {
            if (confirm('Are you sure? This will delete your profile and you\'ll need to start over.')) {
                localStorage.removeItem('roadwork_profile');
                location.reload();
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        async function loadJobs() {
            try {
                const response = await fetch(`${API_URL}/api/jobs`);
                const data = await response.json();
                allJobs = data.jobs || [];
                displayJobs(allJobs);
            } catch (error) {
                document.getElementById('jobsList').innerHTML = `
                    <div class="error">Failed to load jobs. Please refresh the page.</div>
                `;
            }
        }

        function displayJobs(jobs) {
            const jobsList = document.getElementById('jobsList');

            if (jobs.length === 0) {
                jobsList.innerHTML = `<p style="text-align: center; color: #999; padding: 40px;">No jobs found. Try a different search.</p>`;
                return;
            }

            jobsList.innerHTML = jobs.map(job => `
                <div class="job-card">
                    <h3>${job.title}</h3>
                    <div class="company">${job.company}</div>
                    <div class="meta">
                        <span>📂 ${job.category}</span>
                        <span>💰 ${job.salary}</span>
                        <span>📅 ${new Date(job.posted_at).toLocaleDateString()}</span>
                    </div>
                    <div class="description">${job.description.substring(0, 200)}...</div>
                    <button class="apply-btn" onclick='openApplyModal(${JSON.stringify(job).replace(/'/g, "&#39;")})'>
                        Apply with AI Resume ✨
                    </button>
                </div>
            `).join('');
        }

        function searchJobs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allJobs.filter(job =>
                job.title.toLowerCase().includes(query) ||
                job.company.toLowerCase().includes(query) ||
                job.description.toLowerCase().includes(query)
            );
            displayJobs(filtered);
        }

        function openApplyModal(job) {
            currentJob = job;

            document.getElementById('modalJobTitle').textContent = job.title;
            document.getElementById('modalCompany').textContent = `${job.company} • ${job.category}`;
            document.getElementById('applyMessage').innerHTML = '';
            document.getElementById('coverLetter').value = '';

            // Generate AI resume
            const aiResume = generateAIResume(job);
            document.getElementById('aiResume').textContent = aiResume;

            document.getElementById('applyModal').classList.add('active');
        }

        function closeApplyModal() {
            document.getElementById('applyModal').classList.remove('active');
        }

        function generateAIResume(job) {
            // Simple AI resume generation based on user background and job
            const background = userProfile.background;
            const name = userProfile.name;

            // Extract key skills from job description
            const jobLower = (job.title + ' ' + job.description).toLowerCase();

            let resume = `${name}\n${userProfile.email}\n\n`;
            resume += `OBJECTIVE\n`;
            resume += `Seeking ${job.title} position at ${job.company}\n\n`;
            resume += `EXPERIENCE & SKILLS\n`;
            resume += `${background}\n\n`;

            // Add relevant keywords from job
            if (jobLower.includes('customer') || jobLower.includes('support')) {
                resume += `RELEVANT SKILLS\n`;
                resume += `- Customer service excellence\n`;
                resume += `- Problem solving and conflict resolution\n`;
            }
            if (jobLower.includes('sales') || jobLower.includes('account')) {
                resume += `RELEVANT SKILLS\n`;
                resume += `- Sales and business development\n`;
                resume += `- Client relationship management\n`;
            }
            if (jobLower.includes('tech') || jobLower.includes('software') || jobLower.includes('engineer')) {
                resume += `RELEVANT SKILLS\n`;
                resume += `- Technical problem solving\n`;
                resume += `- Software and systems proficiency\n`;
            }

            resume += `\nI am excited about the opportunity to contribute to ${job.company} as a ${job.title}.`;

            return resume;
        }

        async function submitApplication() {
            const btn = document.getElementById('submitAppBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            const aiResume = document.getElementById('aiResume').textContent;
            const coverLetter = document.getElementById('coverLetter').value;

            try {
                const response = await fetch(`${API_URL}/api/jobs/${currentJob.id}/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: userProfile.name,
                        email: userProfile.email,
                        resume: aiResume,
                        cover_letter: coverLetter
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('applyMessage').innerHTML = `
                        <div class="success">
                            ✅ Application submitted successfully!<br>
                            The employer will contact you at ${userProfile.email}
                        </div>
                    `;

                    setTimeout(() => {
                        closeApplyModal();
                        loadJobs(); // Refresh to show updated application count
                    }, 2000);
                } else {
                    document.getElementById('applyMessage').innerHTML = `
                        <div class="error">❌ ${data.error || 'Failed to submit application'}</div>
                    `;
                }
            } catch (error) {
                document.getElementById('applyMessage').innerHTML = `
                    <div class="error">❌ Failed to submit. Please try again.</div>
                `;
            }

            btn.disabled = false;
            btn.textContent = 'Submit Application';
        }

        // Load profile on page load
        loadProfile();
    </script>
</body>
</html>
